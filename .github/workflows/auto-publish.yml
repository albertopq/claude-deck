name: Build, Lint & Auto-Publish

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'contexts/**'
      - 'hooks/**'
      - 'lib/**'
      - 'mcp/**'
      - 'scripts/**'
      - 'stores/**'
      - 'styles/**'
      - 'server.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/auto-publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '24'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version --ignore-scripts
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Push version commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Version ${{ steps.version.outputs.version }}

          Published to:
          - NPM: https://npmjs.com/package/@atercates/claude-deck

          Install: \`npx @atercates/claude-deck@latest\`"
